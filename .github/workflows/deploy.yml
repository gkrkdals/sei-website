name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 올라오면 실행됩니다.

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. 깃허브 도커 창고(GHCR) 로그인
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. 이미지 이름 소문자 변환 (도커 규칙)
        id: string
        uses: ASzc/change-string-case-action@v5
        with:
          string: ${{ github.repository }}

      - name: 4. 도커 이미지 빌드 및 푸시
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.string.outputs.lowercase }}:latest

  deploy-to-server:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 5. 록키 리눅스 서버 접속 및 자동 배포 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # 🌟 서버에서 실행할 명령어 (록키 리눅스의 docker compose 띄어쓰기 문법 적용)
          script: |
            cd /home/devuser/sei-app 
            sudo docker compose pull
            sudo docker compose up -d
            sudo docker image prune -f